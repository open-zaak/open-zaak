name: Check Open API Framework Version

on:
  push:
    branches:
      - master
    tags:
      - '*'
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'

# least privilege as default, should be overridden per job if necessary
permissions:
  contents: read

jobs:
  open-api-workflow-check-oas:
    uses: maykinmedia/open-api-workflows/.github/workflows/oaf-check.yml@79102b911003d75203ca2fed7df01ad79d9b6bba  # v6.4.0

    with:
      python-version: '3.12'
