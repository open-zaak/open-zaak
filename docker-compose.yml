# This is a compose file inteded for trying out the project locally and absolutely
# not suitable for production usage. The configuration here contains non-safe defaults.

version: '3.4'

services:
  db:
    image: postgis/postgis:17-3.5
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
    command: postgres -c max_connections=300 -c log_min_messages=LOG
    volumes:
      - ./docker/postgres.entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
      - db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "11234:5432"
    networks:
      - open-zaak-dev

  redis:
    image: redis:8
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 1s
      retries: 3
    networks:
      - open-zaak-dev

  web.local:
    build: .
    image: openzaak/open-zaak:${TAG:-latest}
    environment: &app-env
      DJANGO_SETTINGS_MODULE: openzaak.conf.docker
      SECRET_KEY: ${SECRET_KEY:-7(h1r2hk)8z9+05edulo_3qzymwbo&c24=)qz7+_@3&2sp=u%i}
      DB_NAME: openzaak
      DB_USER: openzaak
      IS_HTTPS: no
      SITE_DOMAIN: ${SITE_DOMAIN:-localhost:8000}
      ALLOWED_HOSTS: localhost,127.0.0.1,web,web.local
      CORS_ALLOW_ALL_ORIGINS: "True"
      CSRF_TRUSTED_ORIGINS: http://localhost:9000
      CACHE_DEFAULT: redis:6379/0
      CACHE_AXES: redis:6379/0
      SUBPATH: ${SUBPATH:-/}
      IMPORT_DOCUMENTEN_BASE_DIR: ${IMPORT_DOCUMENTEN_BASE_DIR:-/app/import-data}
      IMPORT_DOCUMENTEN_BATCH_SIZE: ${IMPORT_DOCUMENTEN_BATCH_SIZE:-500}
      OPENZAAK_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_PASSWORD: admin
      OPENZAAK_SUPERUSER_EMAIL: admin@localhost
      DISABLE_2FA: true
      # Celery
      CELERY_WORKER_NAME: celery@docker
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_RESULT_EXPIRES: 3600
      CELERY_LOGLEVEL: DEBUG
      CELERY_WORKER_CONCURRENCY: ${CELERY_WORKER_CONCURRENCY:-4}
      ENVIRONMENT: dev
      LOG_NOTIFICATIONS_IN_DB: ${LOG_NOTIFICATIONS_IN_DB:-yes}
      DB_CONN_MAX_AGE: "0"
      DB_POOL_ENABLED: True
      TIME_LEEWAY: ${TIME_LEEWAY:-0}
      ENABLE_CLOUD_EVENTS: ${ENABLE_CLOUD_EVENTS:-False}
      NOTIFICATIONS_SOURCE: ${NOTIFICATIONS_SOURCE:-openzaak}
      SENDFILE_BACKEND: django_sendfile.backends.development

      # Enabling Open Telemetry requires the services in docker/docker-compose.observability.yaml
      # to be up and running.
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      OTEL_RESOURCE_ATTRIBUTES: maykin.saas.client=maykin,maykin.saas.target=dev
      OTEL_METRIC_EXPORT_INTERVAL: ${OTEL_METRIC_EXPORT_INTERVAL:-60000}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}  # gRPC
      # otel:supersecret, escape spaces and = with percent encoding
      OTEL_EXPORTER_OTLP_HEADERS: Authorization=Basic b3RlbDpzdXBlcnNlY3JldA==
      OTEL_EXPORTER_OTLP_METRICS_INSECURE: ${OTEL_EXPORTER_OTLP_METRICS_INSECURE:-true}
      _OTEL_ENABLE_CONTAINER_RESOURCE_DETECTOR: true
    healthcheck:
      test: ["CMD", "maykin-common", "health-check"]
      interval: 30s
      timeout: 5s
      retries: 5
      # This should allow for enough time for migrations to run before the max
      # retries have passed. This healthcheck in turn allows other containers
      # to wait for the database migrations.
      start_period: 30s
    ports:
      - 8000:8000
    volumes: &app-volumes
      - media:/app/media  # Shared media volume to get access to saved OAS files
      - private-media:/app/private-media
      - ./import-data:/app/import-data
      - ./docker/fixtures/catalogi.json:/app/fixtures/catalogi.json
    depends_on:
      db:
        condition: service_healthy
      web-init:
        condition: service_completed_successfully
    labels:
      - app=open-zaak
      - service=api
    networks:
      - open-zaak-dev

  web-init:
    image: openzaak/open-zaak:${TAG:-latest}
    environment:
      <<: *app-env
      #
      # Django-setup-configuration
      RUN_SETUP_CONFIG: ${RUN_SETUP_CONFIG:-true}
    command: /setup_configuration.sh
    volumes:
      - ./docker/setup_configuration:/app/setup_configuration
    depends_on:
      - db
      - redis
    networks:
      - open-zaak-dev

  celery:
    image: openzaak/open-zaak:${TAG:-latest}
    environment: *app-env
    command: /celery_worker.sh
    healthcheck:
      test: [
        "CMD",
        "maykin-common",
        "worker-health-check",
        "--liveness-file=/app/tmp/celery_worker_event_loop.live",
        "--max-age=70",
        "--broker=redis://redis:6379/0",
        "--worker-name=celery@docker",
      ]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes: *app-volumes
    depends_on:
      web.local:
        condition: service_healthy
    networks:
      - open-zaak-dev

  celery-beat:
    image: openzaak/open-zaak:${TAG:-latest}
    environment: *app-env
    command: /celery_beat.sh
    healthcheck:
      test: [
        "CMD",
        "maykin-common",
        "beat-health-check",
        "--file=/app/tmp/celery_beat.live",
        "--max-age=120"
      ]
      interval: 60s
      timeout: 5s
      retries: 5
    depends_on:
      - celery
      - db
      - redis
    networks:
      - open-zaak-dev

  celery-flower:
    image: openzaak/open-zaak:${TAG:-latest}
    environment: *app-env
    command: /celery_flower.sh
    ports:
      - 5555:5555
    depends_on:
      - redis
      - celery
    healthcheck:
      test: [
        "CMD",
        "maykin-common",
        "health-check",
        "--endpoint=http://localhost:5555/"
      ]
    networks:
      - open-zaak-dev

  nginx:
    image: nginx
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - private-media:/private-media
    ports:
      - "9000:80"
    depends_on:
      - web.local
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:80/_healthz/livez/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - open-zaak-dev

volumes:
  db:
  media:
  private-media:

networks:
  open-zaak-dev:
    name: open-zaak-dev
